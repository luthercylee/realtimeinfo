<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>香港天氣及新聞儀表板</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body{font-family:"Microsoft JhengHei",Arial,sans-serif;background:#0f1115;color:#e6e6e6;margin:0;padding:16px;}
  h1{font-size:20px;margin-bottom:4px;}
  .updated{color:#9ad;font-size:12px;margin-bottom:16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .card{background:#1b1e24;border-radius:10px;padding:14px;box-shadow:0 0 8px rgba(0,0,0,.4);}
  .card h2{font-size:16px;margin-top:0;border-bottom:1px solid #333;padding-bottom:6px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th,td{padding:4px 6px;border-bottom:1px solid #2a2d33;text-align:left;}
  #map{height:420px;border-radius:8px;}
  img.wx-img{width:100%;border-radius:8px;}
  .warn{background:#5a1e1e;padding:6px 10px;border-radius:6px;margin-bottom:6px;font-size:13px;}
  .news-item{padding:6px 0;border-bottom:1px solid #2a2d33;font-size:13px;}
  .news-item a{color:#8ec5ff;text-decoration:none;}
  .badge{display:inline-block;background:#264;padding:2px 6px;border-radius:4px;font-size:11px;margin-right:6px;}
</style>
</head>
<body>

<h1>香港天氣及新聞即時儀表板</h1>
<div class="updated" id="lastUpdated">載入中...</div>

<div class="grid">

  <div class="card" style="grid-column:1/3;">
    <h2>各區風力及風向地圖</h2>
    <div id="map"></div>
  </div>

  <div class="card">
    <h2>各區平均風速一覽</h2>
    <table id="windTable">
      <thead><tr><th>觀測站</th><th>風向</th><th>平均風速(km/h)</th><th>最高陣風(km/h)</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h2>熱帶氣旋警告及報告</h2>
    <div id="tcWarnings"></div>
  </div>

  <div class="card">
    <h2>天文台雷達影像 (64公里)</h2>
    <img class="wx-img" id="radarImg" src="" alt="radar loading">
  </div>

  <div class="card">
    <h2>衛星雲圖 (Himawari 可見光)</h2>
    <img class="wx-img" id="satImg" src="" alt="satellite loading">
  </div>

  <div class="card" style="grid-column:1/3;">
    <h2>RTHK 本地新聞</h2>
    <div id="rthkNews"></div>
  </div>

</div>

<script>
// ---------- 設定 ----------
const REFRESH_MS = 10 * 60 * 1000; // 每10分鐘
const WIND_CSV_URL = "https://data.weather.gov.hk/weatherAPI/hko_data/regional-weather/latest_10min_wind.csv";
const WARNSUM_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc";
const WARNINFO_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warningInfo&lang=tc";
const FLW_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=tc";
// 雷達 / 衛星圖：天文台網頁上會定時更新同一路徑的圖檔，用 timestamp 避免瀏覽器快取
const RADAR_IMG_BASE = "https://www.hko.gov.hk/wxinfo/radars/radar_064_c.gif";
const SAT_IMG_BASE = "https://www.hko.gov.hk/wxinfo/satellite/image/vissat_c.jpg";
// RTHK RSS 需要透過 CORS proxy 才能在瀏覽器直接讀取（RTHK 伺服器沒有開放 CORS）
const RTHK_RSS_URL = "https://news.rthk.hk/rthk/ch/rss/e_expressnews.xml";
const CORS_PROXY = "https://api.allorigins.win/raw?url=";

// 主要氣象站約略座標（如需更精準位置，可比對天文台 AWS 站點 GeoJSON 開放數據集）
const STATION_COORDS = {
  "香港天文台": [22.3023,114.1747], "京士柏": [22.3117,114.1742],
  "黃竹坑": [22.2481,114.1614], "跑馬地": [22.2707,114.1839],
  "九龍城": [22.3282,114.1882], "觀塘": [22.3126,114.2256],
  "西貢": [22.3814,114.2734], "沙田": [22.3833,114.1919],
  "打鼓嶺": [22.5333,114.1500], "流浮山": [22.4700,113.9833],
  "屯門": [22.3908,113.9725], "荃灣": [22.3706,114.1147],
  "青衣": [22.3564,114.1064], "長洲": [22.2078,114.0294],
  "坪洲": [22.2833,114.0417], "昂坪": [22.2569,113.9047],
  "香港國際機場": [22.3080,113.9185], "赤鱲角": [22.3080,113.9185],
  "上水": [22.5000,114.1333], "大埔": [22.4500,114.1667],
  "西灣河": [22.2833,114.2167], "深水埗": [22.3300,114.1622],
  "筲箕灣": [22.2794,114.2306], "石崗": [22.4386,114.0797],
  "大美督": [22.4833,114.2333], "橫瀾島": [22.1833,114.3000],
  "赤柱": [22.2178,114.2131], "山頂": [22.2711,114.1489],
  "北潭涌": [22.4067,114.3242], "塔門": [22.4700,114.3650],
  "元朗公園": [22.4450,114.0350], "濕地公園": [22.4675,114.0053],
  "將軍澳": [22.3078,114.2600], "馬灣": [22.3556,114.0525],
  "大澳": [22.2506,113.8611], "大老山": [22.3564,114.2044],
  "大帽山": [22.4106,114.1244], "尖鼻咀": [22.4833,114.0167]
};

let map, markerLayer;
function initMap(){
  map = L.map('map').setView([22.35,114.15], 10.3);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
}

function windArrowHtml(dir){
  const dirs = {"N":0,"NNE":22.5,"NE":45,"ENE":67.5,"E":90,"ESE":112.5,"SE":135,"SSE":157.5,
    "S":180,"SSW":202.5,"SW":225,"WSW":247.5,"W":270,"WNW":292.5,"NW":315,"NNW":337.5};
  const deg = dirs[dir] ?? 0;
  return `<div style="transform:rotate(${deg}deg);font-size:20px;">↑</div>`;
}

async function loadWind(){
  try{
    const res = await fetch(WIND_CSV_URL + "?_=" + Date.now());
    const text = await res.text();
    const lines = text.trim().split("\n").slice(1); // 跳過標題
    const tbody = document.querySelector("#windTable tbody");
    tbody.innerHTML = "";
    markerLayer.clearLayers();
    lines.forEach(line=>{
      const cols = line.split(",").map(c=>c.replace(/"/g,'').trim());
      const [time, station, dir, speed, gust] = cols;
      if(!station) return;
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${station}</td><td>${dir||'-'}</td><td>${speed||'-'}</td><td>${gust||'-'}</td>`;
      tbody.appendChild(tr);

      const coord = STATION_COORDS[station];
      if(coord){
        const marker = L.circleMarker(coord,{radius:6,color:"#5cf",fillOpacity:.8}).addTo(markerLayer);
        marker.bindPopup(`<b>${station}</b><br>風向: ${dir||'-'}<br>風速: ${speed||'-'} km/h<br>陣風: ${gust||'-'} km/h`);
      }
    });
  }catch(e){ console.error("風速資料載入失敗", e); }
}

async function loadWarnings(){
  const box = document.getElementById("tcWarnings");
  box.innerHTML = "";
  try{
    const [flwRes, warnsumRes, warninfoRes] = await Promise.all([
      fetch(FLW_URL).then(r=>r.json()),
      fetch(WARNSUM_URL).then(r=>r.json()),
      fetch(WARNINFO_URL).then(r=>r.json())
    ]);

    if(flwRes.tcInfo){
      box.innerHTML += `<div class="warn"><span class="badge">熱帶氣旋資訊</span>${flwRes.tcInfo.replace(/\n/g,'<br>')}</div>`;
    }
    if(warnsumRes.WTCSGNL){
      const w = warnsumRes.WTCSGNL;
      box.innerHTML += `<div class="warn"><span class="badge">${w.type||w.code}</span>發出時間: ${w.issueTime}</div>`;
    } else {
      box.innerHTML += `<div>目前沒有生效的熱帶氣旋警告信號。</div>`;
    }
    if(warninfoRes.details){
      warninfoRes.details.forEach(d=>{
        if(d.warningStatementCode && d.warningStatementCode.startsWith("WTC")){
          box.innerHTML += `<div class="warn">${d.contents.join("<br>")}</div>`;
        }
      });
    }
  }catch(e){
    box.innerHTML = "熱帶氣旋資料載入失敗，請檢查網絡或稍後重試。";
    console.error(e);
  }
}

function loadImages(){
  const ts = Date.now();
  document.getElementById("radarImg").src = RADAR_IMG_BASE + "?_=" + ts;
  document.getElementById("satImg").src = SAT_IMG_BASE + "?_=" + ts;
}

async function loadRthkNews(){
  const box = document.getElementById("rthkNews");
  try{
    const res = await fetch(CORS_PROXY + encodeURIComponent(RTHK_RSS_URL));
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, "text/xml");
    const items = [...xml.querySelectorAll("item")].slice(0, 15);
    box.innerHTML = "";
    items.forEach(item=>{
      const title = item.querySelector("title")?.textContent || "";
      const link = item.querySelector("link")?.textContent || "#";
      const pubDate = item.querySelector("pubDate")?.textContent || "";
      box.innerHTML += `<div class="news-item"><a href="${link}" target="_blank">${title}</a><br><small>${pubDate}</small></div>`;
    });
  }catch(e){
    box.innerHTML = "RTHK 新聞載入失敗（可能是 CORS 限制，請改用本機代理伺服器）。";
    console.error(e);
  }
}

async function refreshAll(){
  document.getElementById("lastUpdated").textContent = "最後更新: " + new Date().toLocaleString("zh-HK");
  await Promise.all([loadWind(), loadWarnings(), loadRthkNews()]);
  loadImages();
}

initMap();
refreshAll();
setInterval(refreshAll, REFRESH_MS);
</script>
</body>
</html>
