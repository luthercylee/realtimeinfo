<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>香港資訊板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:      #010409;
      --bg-card:      #161b22;
      --bg-card2:     #1c2330;
      --bg-input:     #21262d;
      --border:       #30363d;
      --border-light: #21262d;
      --text-primary: #f0f6fc;
      --text-sec:     #8b949e;
      --text-muted:   #484f58;
      --accent-blue:  #58a6ff;
      --accent-teal:  #3fb950;
      --accent-amber: #d29922;
      --accent-red:   #f85149;
      --font-main:    'Inter', 'Noto Sans TC', sans-serif;
      --radius:       16px;
      --radius-sm:    8px;
      --header-bg:    rgba(1,4,9,0.75);
    }

    body.theme-light {
      --bg-base:      #f6f8fa;
      --bg-card:      #ffffff;
      --bg-card2:     #f3f6f9;
      --bg-input:     #eaeef2;
      --border:       #d0d7de;
      --border-light: #e1e4e8;
      --text-primary: #1f2328;
      --text-sec:     #59636e;
      --text-muted:   #8c959f;
      --accent-blue:  #0969da;
      --accent-teal:  #1a7f37;
      --accent-amber: #9a6700;
      --accent-red:   #d1242f;
      --header-bg:    rgba(246,248,250,0.85);
    }

    /* ===== Layout Core (No Global Scroll for Tablet/Desktop) ===== */
    html, body {
      width: 100%;
      height: 100vh;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #app {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header ===== */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 60px; flex-shrink: 0;
      background: var(--header-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); z-index: 100;
    }
    #header-date { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.02em; }
    #header-right { display: flex; align-items: center; gap: 12px; }
    #clock { font-size: 1.35rem; font-weight: 700; font-family: 'Inter', monospace; font-variant-numeric: tabular-nums; }
    
    .icon-btn {
      background: var(--bg-input); border: 1px solid var(--border); color: var(--text-sec);
      border-radius: var(--radius-sm); padding: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .icon-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }

    /* ===== Status Bar (Update + News Combined) ===== */
    #status-bar {
      display: flex; align-items: stretch; height: 38px; flex-shrink: 0;
      background: var(--bg-card); border-bottom: 1px solid var(--border); font-size: 0.85rem;
    }
    #update-info {
      display: flex; align-items: center; gap: 12px; padding: 0 16px;
      border-right: 1px solid var(--border); color: var(--text-sec); white-space: nowrap; font-weight: 500;
    }
    #countdown-progress { width: 50px; height: 3px; background: var(--bg-input); border-radius: 2px; overflow: hidden; }
    #countdown-fill { height: 100%; background: var(--accent-blue); transition: width 1s linear; }
    
    #news-section { flex: 1; display: flex; align-items: center; gap: 10px; padding: 0 16px; overflow: hidden; }
    #news-ticker-label { font-weight: 700; color: var(--accent-blue); flex-shrink: 0; }
    #news-ticker-wrap { flex: 1; overflow: hidden; position: relative; }
    #news-ticker-track { display: inline-flex; gap: 40px; white-space: nowrap; animation: ticker 40s linear infinite; }
    #status-bar:hover #news-ticker-track { animation-play-state: paused; }
    .ticker-item { color: var(--text-primary); }
    .ticker-time { color: var(--text-muted); font-size: 0.75rem; margin-left: 6px; }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ===== Tips Ticker (Independent Row) ===== */
    #tips-section {
      background: rgba(255,68,68,0.15); border-bottom: 1px solid rgba(255,68,68,0.3);
      display: flex; align-items: center; gap: 10px; padding: 6px 16px; overflow: hidden; flex-shrink: 0;
    }
    #tips-flash-label { flex-shrink: 0; font-size: 0.75rem; font-weight: 800; color: #ff4444; white-space: nowrap; animation: tips-blink 1s step-end infinite; }
    @keyframes tips-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    #tips-ticker-wrap { flex: 1; overflow: hidden; position: relative; }
    #tips-ticker-track { display: inline-flex; gap: 40px; white-space: nowrap; animation: ticker 20s linear infinite; }
    #tips-section:hover #tips-ticker-track { animation-play-state: paused; }

    /* ===== Main Content Area (Split Grid) ===== */
    #main {
      flex: 1;
      padding: 16px;
      display: grid;
      gap: 16px;
      min-height: 0; /* Crucial for inner scrolling */
    }

    @media (min-width: 768px) {
      #main { grid-template-columns: 360px 1fr; }
    }
    @media (max-width: 767px) {
      html, body { height: auto; overflow: auto; }
      #main { grid-template-columns: 1fr; overflow: visible; padding: 12px; }
    }

    .col { display: flex; flex-direction: column; gap: 16px; min-height: 0; overflow-y: auto; }
    .col::-webkit-scrollbar { width: 0; display: none; }

    /* ===== Cards Base ===== */
    .card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      position: relative; overflow: hidden; min-height: 0;
    }
    .card-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border-light);
      display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.02); flex-shrink: 0;
    }
    .card-title { font-size: 0.9rem; font-weight: 700; color: var(--text-sec); display: flex; align-items: center; gap: 6px; letter-spacing: 0.05em; }
    
    /* Transport Card Body with Hidden Scrollbar */
    .card-body.scrollable { padding: 10px 16px; flex: 1; overflow-y: auto; }
    .card-body.scrollable::-webkit-scrollbar { width: 0px; display: none; }

    /* ===== Weather Elements (Left Col) ===== */
    #weather-card { padding: 20px; overflow: visible; flex-shrink: 0; }
    #weather-glow { position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--accent-blue); opacity: 0.1; filter: blur(50px); pointer-events: none; }
    #weather-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    #weather-location { font-size: 1rem; font-weight: 600; color: var(--text-sec); display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    
    #weather-middle { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    
    /* Temperature styling updated to prevent unit wrapping and layout shifts */
    #w-temp-box { display: flex; align-items: flex-start; white-space: nowrap; }
    #weather-temp-num { font-size: 4.5rem; font-weight: 800; line-height: 1; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; display: inline-block; }
    #weather-temp-unit { font-size: 1.5rem; font-weight: 600; color: var(--text-sec); margin-top: 6px; margin-left: 4px; display: inline-block; }
    #weather-icon-img { width: 80px; height: 80px; object-fit: contain; transform: scale(1.2); }

    #weather-row-hum-uv { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .w-pill { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; border: 1px solid; }
    #weather-hum-pill { color: var(--accent-blue); background: rgba(88,166,255,0.1); border-color: rgba(88,166,255,0.2); }
    #weather-uv-pill { color: var(--accent-amber); background: rgba(210,153,34,0.1); border-color: rgba(210,153,34,0.2); }
    #weather-rain-pill { color: var(--accent-teal); background: rgba(63,185,80,0.1); border-color: rgba(63,185,80,0.2); }

    #weather-bottom-row { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
    #weather-temp-range { display: flex; gap: 14px; }
    #weather-sun-row { display: flex; gap: 14px; color: var(--text-muted); }

    /* Warnings Card (Left Col) */
    #warnings-card { flex-shrink: 0; }
    #warnings-list { display: flex; flex-wrap: wrap; gap: 12px; padding: 14px 16px; }
    .warn-icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .warn-icon-img { width: 42px; height: 42px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .warn-none { font-size: 0.9rem; color: var(--accent-teal); }

    /* Forecast Card (Left Col) */
    #forecast-card { flex: 1; } 
    /* Outlook layout overlap fixes */
    #forecast-desc { display: block; font-size: 0.95rem; line-height: 1.6; color: var(--text-primary); margin-bottom: 12px; height: auto !important; }
    #forecast-outlook-wrap { display: block; font-size: 0.85rem; line-height: 1.5; color: var(--text-sec); padding-top: 12px; border-top: 1px dashed var(--border-light); }
    #forecast-outlook-label { font-size: 0.7rem; font-weight: 800; color: var(--accent-amber); background: rgba(210,153,34,0.15); padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block; }

    /* ===== High Density Transport Rows (Right Col) ===== */
    .t-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border-light); gap: 12px;
    }
    .t-row:last-child { border-bottom: none; padding-bottom: 0; }
    .t-row:first-child { padding-top: 0; }
    
    .t-left { display: flex; gap: 12px; align-items: center; min-width: 0; flex: 1; }
    
    .route-badge {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 34px; border-radius: 6px; font-weight: 800; font-size: 0.95rem; flex-shrink: 0;
      border: 1px solid; letter-spacing: 0.02em;
    }
    
    /* Route Colors Map */
    .bus-kmb { background: rgba(255,123,114,0.18); color: #ff7b72; border-color: rgba(255,123,114,0.35); }
    .bus-ctb { background: rgba(88,166,255,0.18); color: #58a6ff; border-color: rgba(88,166,255,0.35); }
    /* MTR line colors — used on badge (old) and on line name text */
    .mtr-AEL { background:#00888a; color:#fff; border-color:#00888a; } 
    .mtr-TCL { background:#f7943d; color:#fff; border-color:#f7943d; } 
    .mtr-TML { background:#923011; color:#fff; border-color:#923011; } 
    .mtr-TKL { background:#7d499a; color:#fff; border-color:#7d499a; } 
    .mtr-EAL { background:#5eb5e6; color:#fff; border-color:#5eb5e6; } 
    .mtr-SIL { background:#cbd300; color:#222; border-color:#cbd300; } 
    .mtr-TWL { background:#e2231a; color:#fff; border-color:#e2231a; } 
    .mtr-ISL { background:#005daa; color:#fff; border-color:#005daa; } 
    .mtr-KTL { background:#1daa5b; color:#fff; border-color:#1daa5b; } 
    .mtr-DRL { background:#eb6ea5; color:#fff; border-color:#eb6ea5; }
    /* Color-only for line name text */
    .mtr-text-AEL { color:#00888a; } .mtr-text-TCL { color:#f7943d; } .mtr-text-TML { color:#923011; }
    .mtr-text-TKL { color:#7d499a; } .mtr-text-EAL { color:#5eb5e6; } .mtr-text-SIL { color:#9a9a00; }
    .mtr-text-TWL { color:#e2231a; } .mtr-text-ISL { color:#005daa; } .mtr-text-KTL { color:#1daa5b; }
    .mtr-text-DRL { color:#eb6ea5; }

    .t-info { display: flex; flex-direction: column; min-width: 0; }
    .t-name { font-size: 1rem; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-dest { font-size: 0.75rem; color: var(--text-sec); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;}

    .t-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    /* MTR 3-col grid row */
    .mtr-row { display: grid; grid-template-columns: auto 1fr 1fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
    .mtr-row:last-child { border-bottom: none; padding-bottom: 0; }
    .mtr-row:first-child { padding-top: 0; }
    .mtr-col1 { display: flex; flex-direction: column; gap: 2px; }
    .mtr-line-name { font-size: 0.92rem; font-weight: 800; white-space: nowrap; }
    .mtr-sta-name { font-size: 0.82rem; color: var(--text-sec); white-space: nowrap; }
    .mtr-col-dir { display: flex; flex-direction: column; gap: 5px; }
    .mtr-dir-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 700; white-space: nowrap; }
    .mtr-pills { display: flex; gap: 4px; flex-wrap: wrap; }

    .eta-pill {
      display: inline-flex; align-items: baseline; justify-content: center;
      padding: 4px 8px; border-radius: 6px; background: var(--bg-card2); border: 1px solid var(--border);
      font-size: 1.1rem; font-weight: 800; font-variant-numeric: tabular-nums; min-width: 32px;
    }
    .eta-pill-mins { font-size: 0.75rem; color: var(--text-sec); font-weight: 600; margin-left: 2px; }
    
    .eta-arriving { color: var(--accent-teal); border-color: rgba(63,185,80,0.4); background: rgba(63,185,80,0.08); }
    .eta-soon     { color: var(--accent-amber); border-color: rgba(210,153,34,0.4); background: rgba(210,153,34,0.08); }
    .eta-normal   { color: var(--text-primary); }
    .eta-empty    { font-size: 0.85rem; color: var(--text-muted); padding: 4px 0; border:none; background:transparent; }

    .bus-loading { display: flex; align-items: center; justify-content: center; padding: 20px; gap: 8px; color: var(--text-muted); font-size: 0.92rem; }

    /* Skeleton pulse */
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .skeleton { background: var(--bg-input); border-radius: 4px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }

    /* ===== Settings Panel ===== */
    #settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; backdrop-filter: blur(4px); }
    #settings-panel { position: absolute; top: 0; right: 0; width: 100%; max-width: 420px; height: 100%; background: var(--bg-card); border-left: 1px solid var(--border); overflow-y: auto; padding: 0 0 32px; }
    #settings-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-card); z-index: 10; }
    #settings-header h2 { font-size: 1rem; font-weight: 700; }
    #settings-close { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-sec); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 1.003rem; cursor: pointer; font-family: var(--font-main); }
    .settings-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .settings-section-title { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .settings-field { margin-bottom: 12px; }
    .settings-field:last-child { margin-bottom: 0; }
    .settings-label { font-size: 0.92rem; color: var(--text-sec); margin-bottom: 5px; display: block; font-weight: 500; }
    .settings-input, .settings-select { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 1rem; font-family: var(--font-main); outline: none; transition: border-color 0.15s; }
    .settings-input:focus, .settings-select:focus { border-color: var(--accent-blue); }
    .settings-select option { background: var(--bg-card); }
    #bus-routes-config, #mtr-routes-config { display: flex; flex-direction: column; gap: 10px; }
    .bus-config-block { background: var(--bg-card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; position: relative; }
    .bus-config-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .bus-config-label { font-size: 0.92rem; font-weight: 600; color: var(--text-sec); }
    .bus-config-remove { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; padding: 0 2px; }
    .bus-config-remove:hover { color: var(--accent-red); }
    .bus-config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .bus-config-row:last-child { margin-bottom: 0; }
    .bus-config-full { grid-column: 1/-1; }
    .settings-btn-primary { width: 100%; background: var(--accent-blue); border: none; color: #0d1117; border-radius: var(--radius-sm); padding: 9px; font-size: 1.038rem; font-weight: 700; cursor: pointer; margin-top: 12px; transition: opacity 0.15s; }
    .settings-btn-primary:hover { opacity: 0.88; }
    .settings-btn-secondary { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-sec); border-radius: var(--radius-sm); padding: 7px 12px; font-size: 0.968rem; cursor: pointer; }
    .settings-btn-secondary:hover { background: var(--border); }
    .settings-hint { font-size: 0.826rem; color: var(--text-muted); margin-top: 4px; }
    #settings-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-card); position: sticky; top: 49px; z-index: 9; }
    .stab { flex: 1; padding: 10px 4px; font-size: 0.92rem; font-weight: 600; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .stab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
    .stab:hover:not(.active) { color: var(--text-sec); }
    .stab-content { display: block; }
    .stab-visibility-row { display: flex; align-items: center; justify-content: space-between; }
    .stab-visibility-label { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
    .vis-toggle { font-size: 0.885rem; font-weight: 600; padding: 5px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; background: var(--bg-input); color: var(--text-sec); }
    .vis-toggle.is-hidden { background: rgba(248,81,73,0.12); color: var(--accent-red); border-color: rgba(248,81,73,0.3); }
    #stop-search-result { margin-top: 6px; font-size: 0.885rem; color: var(--text-sec); max-height: 160px; overflow-y: auto; }
    .stop-result-item { padding: 5px 6px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; }
    .stop-result-item:hover { background: var(--bg-input); border-color: var(--border); }
    .stop-result-id { color: var(--text-muted); font-size: 0.802rem; margin-left: 4px; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--bg-card2); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius-sm); padding: 8px 16px; font-size: 0.968rem; z-index: 999; opacity: 0; transition: transform 0.25s, opacity 0.25s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Light Theme Adjustments */
    body.theme-light .bus-kmb { background:rgba(207,34,46,.08);color:#cf222e;border-color:rgba(207,34,46,.25); }
    body.theme-light .bus-ctb { background:rgba(9,105,218,.08);color:#0969da;border-color:rgba(9,105,218,.25); }
    body.theme-light .eta-pill { background: var(--bg-card); border-color: var(--border); }
    body.theme-light .settings-select option { background:#fff;color:#1f2328; }

    /* ===== News Card ===== */
    #news-card { flex-shrink: 0; }
    .news-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border-light); padding: 0 12px; flex-shrink: 0; }
    .news-tab-btn { padding: 7px 12px; font-size: 0.8rem; font-weight: 700; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); cursor: pointer; transition: color 0.15s, border-color 0.15s; font-family: var(--font-main); }
    .news-tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
    .news-tab-btn:hover:not(.active) { color: var(--text-sec); }
    .news-list { padding: 8px 14px; display: flex; flex-direction: column; gap: 0; }
    .news-item { display: flex; align-items: baseline; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border-light); }
    .news-item:last-child { border-bottom: none; }
    .news-item-time { font-size: 0.75rem; color: var(--text-muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .news-item-title { font-size: 0.88rem; color: var(--text-primary); line-height: 1.4; }

    /* ===== LANDSCAPE (Tablet) — default ===== */
    html, body { font-size: 16px; }
    #app { max-width: 1400px; }
    #header { height: 60px; padding: 0 20px; }
    #header-date { font-size: 1.15rem; }
    #clock { font-size: 1.35rem; }
    #status-bar { height: 38px; font-size: 0.85rem; }
    #main { padding: 16px; gap: 16px; grid-template-columns: 360px 1fr; }
    .col { gap: 16px; }
    #weather-card { padding: 20px; }
    #weather-temp-num { font-size: 4.5rem; }
    #weather-icon-img { width: 80px; height: 80px; }
    .warn-icon-img { width: 42px; height: 42px; }
    /* Landscape fixed card heights */
    /* bus: header(44)+body-pad(20)+3rows(~47each)=205px; mtr: header(44)+body-pad(20)+2rows(~80each)=304→use auto? No: fixed */
    #bus-card { height: 210px; flex: none; overflow: hidden; }
    #bus-card .card-body.scrollable { overflow-y: auto; }
    #mtr-card { height: 260px; flex: none; overflow: hidden; }
    #mtr-card .card-body.scrollable { overflow-y: auto; }
    #news-card { flex: 1; min-height: 0; overflow: hidden; }
    #news-card .card-body.scrollable { overflow: hidden; }

    /* ===== PORTRAIT (Phone) ===== */
    body.layout-portrait {
      font-size: 14px;
    }
    body.layout-portrait { overflow-y: auto; height: auto; min-height: 100vh; }
    body.layout-portrait #app {
      max-width: 430px;
      height: auto;
      min-height: 100vh;
    }
    body.layout-portrait #header {
      height: 50px;
      padding: 0 12px;
    }
    body.layout-portrait #header-date { font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    body.layout-portrait #clock { font-size: 1.1rem; }
    body.layout-portrait .icon-btn { padding: 6px; }
    body.layout-portrait #header-right { gap: 8px; }
    body.layout-portrait #status-bar { height: 34px; font-size: 0.78rem; }
    body.layout-portrait #update-info { padding: 0 10px; gap: 8px; }
    body.layout-portrait #news-section { padding: 0 10px; }
    body.layout-portrait #tips-section { padding: 4px 10px; }
    body.layout-portrait #main {
      grid-template-columns: 1fr !important;
      padding: 10px;
      gap: 10px;
      overflow: visible;
      flex: none;
    }
    body.layout-portrait .col { gap: 10px; }
    body.layout-portrait #weather-card { padding: 14px; }
    body.layout-portrait #weather-temp-num { font-size: 3.2rem; }
    body.layout-portrait #weather-icon-img { width: 56px; height: 56px; }
    body.layout-portrait .warn-icon-img { width: 34px; height: 34px; }
    body.layout-portrait #warnings-list { gap: 8px; padding: 10px 12px; }
    body.layout-portrait .card-header { padding: 8px 12px; }
    body.layout-portrait .card-body.scrollable { padding: 6px 12px; }
    body.layout-portrait .t-row { padding: 8px 0; }
    body.layout-portrait .route-badge { width: 40px; height: 30px; font-size: 0.82rem; }
    body.layout-portrait .t-name { font-size: 0.88rem; }
    body.layout-portrait .t-dest { font-size: 0.7rem; }
    body.layout-portrait .eta-pill { font-size: 0.95rem; padding: 3px 6px; }
    body.layout-portrait .w-pill { font-size: 0.78rem; padding: 3px 8px; }
    body.layout-portrait #weather-row-hum-uv { margin-top: 10px; gap: 6px; }
    body.layout-portrait #weather-bottom-row { margin-top: 10px; padding-top: 10px; font-size: 0.78rem; }
    body.layout-portrait #forecast-desc { font-size: 0.85rem; }
    body.layout-portrait #forecast-outlook-wrap { font-size: 0.78rem; }
    body.layout-portrait .mtr-row { gap: 6px; }
    body.layout-portrait .mtr-line-name { font-size: 0.8rem; }
    body.layout-portrait .mtr-sta-name { font-size: 0.72rem; }
    body.layout-portrait .mtr-dir-label { font-size: 0.65rem; }
    body.layout-portrait .settings-panel { max-width: 100%; }
    /* phone: left col overflows naturally, no fixed height */
    body.layout-portrait .col { overflow: visible; max-height: none; }
    /* portrait: all cards auto height, no scroll */
    body.layout-portrait #bus-card { height: auto; flex: none; }
    body.layout-portrait #mtr-card { height: auto; flex: none; }
    body.layout-portrait #news-card { height: auto; flex: none; }
    body.layout-portrait #news-card .card-body.scrollable { overflow: visible; }
    body.layout-portrait .card-body.scrollable { overflow: visible; }
    body.layout-portrait .news-item-title { font-size: 0.82rem; }
  </style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <h1 id="header-date" style="margin-left:0;">—</h1>
    </div>
    <div id="header-right">
      <div id="clock">--:--:--</div>
      <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>
      <button class="icon-btn" onclick="manualToggleTheme()" title="切換日夜模式">
        <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button class="icon-btn" onclick="manualRefresh()" title="立即更新">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
      <button class="icon-btn" id="orient-btn" onclick="toggleOrientation()" title="切換直倒/橫倒">
        <svg id="orient-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/></svg>
      </button>
      <button class="icon-btn" onclick="openSettings()" title="設定">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <!-- Status Bar (Combined Update & News) -->
  <div id="status-bar">
    <div id="update-info">
      <span id="last-updated">尚未更新</span>
      <div id="countdown-progress"><div id="countdown-fill" style="width:100%"></div></div>
    </div>
    <div id="news-section">
      <span id="news-ticker-label">📰 新聞</span>
      <div id="news-ticker-wrap">
        <div id="news-ticker-track"><span class="ticker-item">載入中…</span></div>
      </div>
    </div>
  </div>

  <!-- Tips Ticker (Independent Row) -->
  <div id="tips-section" style="display:none;">
    <span id="tips-flash-label">⚡ 提示</span>
    <div id="tips-ticker-wrap">
      <span id="tips-ticker-track"></span>
    </div>
  </div>

  <!-- Main Content (Split Grid) -->
  <div id="main">

    <!-- LEFT COLUMN (Weather & Forecast) -->
    <div class="col" id="col-left">
      <!-- Weather Card -->
      <div class="card" id="weather-card">
        <div id="weather-glow"></div>
        <div id="weather-card-top">
          <div id="weather-location" class="skeleton" style="width:80px;height:16px;border-radius:4px;"></div>
        </div>
        <div id="weather-middle">
          <div id="w-temp-box">
            <span id="weather-temp-num" class="skeleton" style="width:90px;height:60px;border-radius:6px;display:block;"> </span>
            <span id="weather-temp-unit" style="display:none;">°C</span>
          </div>
          <img id="weather-icon-img" src="" alt="" style="display:none;">
        </div>
        
        <div id="weather-row-hum-uv" style="display:none;">
          <div class="w-pill" id="weather-hum-pill">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></svg>
            <span id="weather-hum-val">--</span>%
          </div>
          <div class="w-pill" id="weather-uv-pill" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            UV <span id="weather-uv-val">--</span>
          </div>
          <div class="w-pill" id="weather-rain-pill" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 16.25"/><line x1="8" y1="16" x2="8" y2="21"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="16" y1="16" x2="16" y2="21"/></svg>
            <span id="weather-rain-val">--</span>mm
          </div>
        </div>

        <div id="weather-bottom-row" style="display:none;">
        <div id="weather-temp-range">
          <span style="display:flex;align-items:center;gap:4px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f85149" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 7l-5-5-5 5"/></svg>
            <span id="temp-max">--°C</span>
          </span>
          <span style="display:flex;align-items:center;gap:4px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V2M17 17l-5 5-5-5"/></svg>
            <span id="temp-min">--°C</span>
          </span>
        </div>
        <div id="weather-sun-row">
          <span style="display:flex;align-items:center;gap:4px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m8 6 4-4 4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>
            <span id="sunrise-time">--:--</span>
          </span>
          <span style="display:flex;align-items:center;gap:4px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10v8"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m16 6-4 4-4-4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>
            <span id="sunset-time">--:--</span>
          </span>
        </div>
        </div><!-- /weather-bottom-row -->
      </div>

      <!-- Warnings Card (No text, only Icons) -->
      <div class="card" id="warnings-card">
        <div class="card-header">
          <div class="card-title"><span>⚠</span><span>生效警告</span></div>
        </div>
        <div class="card-body" id="warnings-list" style="padding: 14px 16px;">
          <div class="skeleton" style="width:90px;height:24px;border-radius:20px;"></div>
        </div>
      </div>

      <!-- Forecast Card -->
      <div class="card" id="forecast-card">
        <div class="card-header">
          <div class="card-title"><span>📋</span><span>本港地區天氣預報</span></div>
          <!-- 隱藏了多餘的日期副標題 -->
        </div>
        <div class="card-body scrollable">
          <div id="forecast-desc" class="skeleton" style="height:14px;border-radius:4px;"></div>
          <div id="forecast-outlook-wrap" style="display:none;">
            <div id="forecast-outlook-label">展望</div>
            <div id="forecast-outlook"></div>
          </div>
        </div>
      </div>
    </div> <!-- /col-left -->

    <!-- RIGHT COLUMN (Transport) -->
    <div class="col" id="col-right">
      
      <!-- Bus Card -->
      <div class="card" id="bus-card" style="flex: 1;">
        <div class="card-header">
          <div class="card-title"><span>🚌</span><span>巴士班次</span></div>
          <span id="bus-count-label" style="font-size:0.75rem;color:var(--text-muted)"></span>
        </div>
        <div class="card-body scrollable" id="bus-routes-container">
          <div class="bus-loading"><div class="spinner"></div> 載入中…</div>
        </div>
      </div>

      <!-- MTR Card -->
      <div class="card" id="mtr-card" style="flex: 1;">
        <div class="card-header">
          <div class="card-title"><span>🚇</span><span>港鐵班次</span></div>
          <span id="mtr-count-label" style="font-size:0.75rem;color:var(--text-muted)"></span>
        </div>
        <div class="card-body scrollable" id="mtr-routes-container">
          <div class="bus-loading"><div class="spinner"></div> 載入中…</div>
        </div>
      </div>

      <!-- News Card -->
      <div class="card" id="news-card">
        <div class="card-header" style="padding:10px 14px;">
          <div class="card-title"><span>📰</span><span>即時新聞</span></div>
        </div>
        <div class="news-tabs" id="news-card-tabs"></div>
        <div class="card-body scrollable" id="news-card-body" style="padding:0;"></div>
      </div>

    </div> <!-- /col-right -->

  </div><!-- /main -->
</div><!-- /app -->

<!-- Settings Overlay (Hidden by default, keeps previous complete logic) -->
<div id="settings-overlay" onclick="handleOverlayClick(event)">
  <div id="settings-panel">
    <div id="settings-header">
      <h2>&#x2699; 後台設定</h2>
      <button id="settings-close" onclick="closeSettings()">&#x2715; 關閉</button>
    </div>

    <div id="settings-tabs">
      <button class="stab active" data-tab="general" onclick="switchSettingsTab('general')">更新設定</button>
      <button class="stab" data-tab="bus" onclick="switchSettingsTab('bus')">巴士資料</button>
      <button class="stab" data-tab="mtr" onclick="switchSettingsTab('mtr')">港鐵資料</button>
      <button class="stab" data-tab="news" onclick="switchSettingsTab('news')">新聞設定</button>
    </div>

    <!-- Tab: General -->
    <div id="stab-general" class="stab-content">
      <div class="settings-section">
        <div class="settings-section-title">一般設定</div>
        <div class="settings-field">
          <label class="settings-label">自動更新間隔（分鐘）</label>
          <select class="settings-select" id="cfg-interval">
            <option value="5">5 分鐘</option>
            <option value="10" selected>10 分鐘</option>
            <option value="30">30 分鐘</option>
            <option value="60">1 小時</option>
          </select>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">天氣設定</div>
        <div class="settings-field">
          <label class="settings-label">天氣觀測站</label>
          <select class="settings-select" id="cfg-weather-station">
            <option value="HKO">香港天文台 (HKO)</option>
            <option value="KP">京士柏 (Kings Park)</option>
            <option value="HKP">香港公園 (Hong Kong Park)</option>
            <option value="HKS">黃竹坑 (Wong Chuk Hang)</option>
            <option value="HPV">跑馬地 (Happy Valley)</option>
            <option value="JKB">將軍澳 (Tseung Kwan O)</option>
            <option value="KLT">九龍城 (Kowloon City)</option>
            <option value="KTG">觀塘 (Kwun Tong)</option>
            <option value="SSP">深水埗 (Sham Shui Po)</option>
            <option value="WTS">黃大仙 (Wong Tai Sin)</option>
            <option value="SHA">沙田 (Sha Tin)</option>
            <option value="TUN">屯門 (Tuen Mun)</option>
            <option value="YLP">元朗公園 (Yuen Long Park)</option>
            <option value="TW">荃灣城門谷 (Tsuen Wan Shing Mun Valley)</option>
            <option value="TWN">荃灣可觀 (Tsuen Wan Mong Tseng Wai)</option>
            <option value="TY1">青衣 (Tsing Yi)</option>
            <option value="CLK">赤鱲角 (Chek Lap Kok)</option>
            <option value="CCH">長洲 (Cheung Chau)</option>
            <option value="SKG">西貢 (Sai Kung)</option>
            <option value="SWH">筲箕灣 (Shau Kei Wan)</option>
            <option value="STY">赤柱 (Stanley)</option>
            <option value="YCT">大埔 (Tai Po)</option>
            <option value="PLC">大美督 (Tai Mei Tuk)</option>
            <option value="TKL">打鼓嶺 (Ta Kwu Ling)</option>
            <option value="SEK">石崗 (Shek Kong)</option>
            <option value="SE1">啟德跑道公園 (Kai Tak Runway Park)</option>
            <option value="LFS">流浮山 (Lau Fau Shan)</option>
            <option value="EPC">平洲 (Ping Chau)</option>
            <option value="KAT">吉澳 (Kat O)</option>
            <option value="STK">沙頭角 (Sha Tau Kok)</option>
            <option value="TBT">尖鼻咀 (Tsim Bei Tsui)</option>
            <option value="TAP">塔門 (Tap Mun)</option>
            <option value="YNF">元五墳 (Yuen Ng Fan)</option>
          </select>
        </div>
      </div>
      <div class="settings-section" style="border-bottom:none;">
        <button class="settings-btn-primary" onclick="saveSettings()">&#x2713; 儲存並套用設定</button>
      </div>
    </div>

    <!-- Tab: Bus -->
    <div id="stab-bus" class="stab-content" style="display:none;">
      <div class="settings-section">
        <div class="stab-visibility-row">
          <span class="stab-visibility-label">顯示巴士班次欄</span>
          <button id="bus-vis-btn" class="vis-toggle" onclick="toggleBusVisible()">隱藏</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">巴士路線設定</div>
        <div id="bus-routes-config"></div>
        <button class="settings-btn-secondary" onclick="addBusRoute()" style="margin-top:10px;width:100%">
          ＋ 新增巴士路線
        </button>
      </div>
      <div class="settings-section">
        <div class="settings-label" style="font-weight:600;color:var(--accent-blue);">&#x1F50D; 車站 ID 查詢工具</div>
        <div class="settings-hint" style="margin-bottom:6px;">選擇巴士公司及輸入路線號，搜尋並複製車站 ID</div>
        <div class="bus-config-row" style="margin-bottom:6px;">
          <select class="settings-select" id="search-company">
            <option value="KMB">九巴 KMB</option>
            <option value="CTB">城巴 CTB</option>
          </select>
          <input type="text" class="settings-input" id="search-route-input" placeholder="路線號 (如 1A)">
        </div>
        <select class="settings-select" id="search-direction" style="margin-bottom:6px;">
          <option value="outbound">往外線 (outbound)</option>
          <option value="inbound">往內線 (inbound)</option>
        </select>
        <button class="settings-btn-secondary" onclick="lookupStops()" style="width:100%">搜尋車站</button>
        <div id="stop-search-result"></div>
      </div>
      <div class="settings-section" style="border-bottom:none;">
        <button class="settings-btn-primary" onclick="saveSettings()">&#x2713; 儲存並套用設定</button>
      </div>
    </div>

    <!-- Tab: MTR -->
    <div id="stab-mtr" class="stab-content" style="display:none;">
      <div class="settings-section">
        <div class="stab-visibility-row">
          <span class="stab-visibility-label">顯示港鐵班次欄</span>
          <button id="mtr-vis-btn" class="vis-toggle" onclick="toggleMTRVisible()">隱藏</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">港鐵車站設定</div>
        <div id="mtr-routes-config"></div>
        <button class="settings-btn-secondary" onclick="addMTRRoute()" style="margin-top:10px;width:100%">
          ＋ 新增港鐵車站
        </button>
      </div>
      <div class="settings-section" style="border-bottom:none;">
        <button class="settings-btn-primary" onclick="saveSettings()">&#x2713; 儲存並套用設定</button>

function loadConfig() { try { const raw = localStorage.getItem('hk_dashboard_cfg'); if (raw) return { ...DEFAULT_CONFIG, ...JSON.parse(raw) }; } catch(e) {} return { ...DEFAULT_CONFIG }; }
function saveConfigToStorage(cfg) { localStorage.setItem('hk_dashboard_cfg', JSON.stringify(cfg)); }

// ===== Time & Countdown =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}
setInterval(updateClock, 1000); updateClock();

function startCountdown(minutes) {
  clearInterval(countdownTimer);
  countdownTotal = minutes * 60; countdownRemaining = countdownTotal;
  function tick() {
    countdownRemaining = Math.max(0, countdownRemaining - 1);
    const fill = document.getElementById('countdown-fill');
    if (fill) fill.style.width = ((countdownRemaining / countdownTotal) * 100) + '%';
  }
  tick(); countdownTimer = setInterval(tick, 1000);
}

function scheduleAutoRefresh() {
  clearInterval(autoRefreshTimer); startCountdown(config.interval);
  autoRefreshTimer = setInterval(() => { fetchAll(); startCountdown(config.interval); }, config.interval * 60000);
}
function manualRefresh() { fetchAll(); startCountdown(config.interval); }

// ===== Weather Fetch =====
async function fetchWeather() {
  const lang = config.lang === 'tc' ? 'tc' : 'en'; const station = config.weatherStation || 'HKO';
  try {
    const timeout = ms => new Promise((_, r) => setTimeout(() => r(new Error('Timeout')), ms));
    const safeFetch = url => Promise.race([fetch(url), timeout(12000)]);

    const [rhrRes, warnRes, swtRes, flwRes, fndRes] = await Promise.all([
      safeFetch(`https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=${lang}`),
      safeFetch(`https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=${lang}`),
      safeFetch(`https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=${lang}`),
      safeFetch(`https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=${lang}`),
      safeFetch(`https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=${lang}`)
    ]);

    const rhr = await rhrRes.json(); const warn = await warnRes.json(); const swt = await swtRes.json(); const flw = await flwRes.json(); const fnd = await fndRes.json();

    fetch('https://data.weather.gov.hk/weatherAPI/opendata/hourlyRainfall.php?lang=tc').then(r => r.json()).then(rn => {
        const hkoRain = (rn.hourlyRainfall || []).find(x => x.automaticWeatherStationID === 'RF023');
        const rainPill = document.getElementById('weather-rain-pill'); const rainVal = document.getElementById('weather-rain-val');
        if (rainPill && rainVal && hkoRain && hkoRain.value !== 'M') { rainVal.textContent = hkoRain.value; rainPill.style.display = 'flex'; }
    }).catch(() => {});

    renderWeather(rhr, warn, swt, flw, fnd, station, lang);
  } catch(e) { showWeatherError(e.message); }
}

const STATION_NAMES = {
  HKO:'香港天文台',KP:'京士柏',HKP:'香港公園',HKS:'黃竹坑',HPV:'跑馬地',JKB:'將軍澳',KLT:'九龍城',KTG:'觀塘',SSP:'深水埗',WTS:'黃大仙',SHA:'沙田',TUN:'屯門',YLP:'元朗公園',TW:'荃灣城門谷',TWN:'荃灣可觀',TY1:'青衣',CLK:'赤鱲角',CCH:'長洲',SKG:'西貢',SWH:'筲箕灣',STY:'赤柱',YCT:'大埔',PLC:'大美督',TKL:'打鼓嶺',SEK:'石崗',SE1:'啟德跑道公園',LFS:'流浮山',EPC:'平洲',KAT:'吉澳',STK:'沙頭角',TBT:'尖鼻咀',TAP:'塔門',YNF:'元五墳'
};

function getStationName(code) { return STATION_NAMES[code] || code; }

function renderWeather(rhr, warn, swt, flw, fnd, station, lang) {
  const STATION_PLACE_TC = { HKO:'香港天文台', KP:'京士柏', HKP:'香港公園', HKS:'黃竹坑', HPV:'跑馬地', JKB:'將軍澳', KLT:'九龍城', KTG:'觀塘', SSP:'深水埗', WTS:'黃大仙', SHA:'沙田', TUN:'屯門', YLP:'元朗公園', TW:'荃灣城門谷', TWN:'荃灣可觀', TY1:'青衣', CLK:'赤鱲角', CCH:'長洲', SKG:'西貢', SWH:'筲箕灣', STY:'赤柱', YCT:'大埔', PLC:'大美督', TKL:'打鼓嶺', SE1:'啟德跑道公園', LFS:'流浮山' };

  const tempData = (rhr.temperature || {}).data || [];
  const humData  = (rhr.humidity   || {}).data || [];
  const stationPlaceTC = STATION_PLACE_TC[station] || null;

  let tempEntry = stationPlaceTC ? tempData.find(d => d.place === stationPlaceTC) || null : null;
  let humEntry = humData.find(d => d.place === '香港天文台') || humData[0] || null;

  const rawTemp = tempEntry ? tempEntry.value : null; const rawHum = humEntry ? humEntry.value : null;
  
  // 🔥 FIX 1: Removed Decimal places by using Math.round()
  const temp = rawTemp !== null ? Math.round(rawTemp).toString() : '--'; 
  const hum = rawHum !== null ? Math.round(rawHum).toString() : '--';
  
  const place = tempEntry ? tempEntry.place : (stationPlaceTC || getStationName(station));

  document.getElementById('weather-location').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>' + place;
  
  if (document.getElementById('weather-icon-img')) { document.getElementById('weather-icon-img').src = `https://www.hko.gov.hk/images/wxicon/pic${rhr.icon[0] || 50}.png`; document.getElementById('weather-icon-img').style.display = 'block'; }
  if (document.getElementById('weather-temp-num')) { document.getElementById('weather-temp-num').textContent = temp; document.getElementById('weather-temp-num').className = ''; }
  if (document.getElementById('weather-temp-unit')) document.getElementById('weather-temp-unit').style.display = 'inline-block';
  
  if (document.getElementById('weather-hum-val')) document.getElementById('weather-hum-val').textContent = hum;
  if (document.getElementById('weather-row-hum-uv')) document.getElementById('weather-row-hum-uv').style.display = 'flex';

  const uvData = (rhr.uvindex || {}).data || []; const uvEntry = uvData.find(d => d.place === '京士柏') || uvData[0] || null;
  if (document.getElementById('weather-uv-pill') && document.getElementById('weather-uv-val')) {
    document.getElementById('weather-uv-val').textContent = (uvEntry && uvEntry.value !== '' && uvEntry.value != null) ? uvEntry.value : '0';
    document.getElementById('weather-uv-pill').style.display = 'flex';
  }

  // Warnings (Icons only, no text)
  renderWarnings(warn);

  // Tips Row
  const swtArr = Array.isArray(swt) ? swt : (Array.isArray(swt?.swt) ? swt.swt : []);
  const tipsEl = document.getElementById('tips-section');
  if (tipsEl) {
    const validTips = swtArr.filter(s => s.desc);
    if (validTips.length) {
      const fmtT = ut => { try { return new Date(ut).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit',hour12:false}); } catch(e){ return ''; } };
      document.getElementById('tips-ticker-track').innerHTML = validTips.map(s => `<span class="ticker-item">${s.desc}${s.updateTime ? '<span class="ticker-time">' + fmtT(s.updateTime) + '</span>' : ''}</span>`).join('') + validTips.map(s => `<span class="ticker-item">${s.desc}${s.updateTime ? '<span class="ticker-time">' + fmtT(s.updateTime) + '</span>' : ''}</span>`).join('');
      tipsEl.style.display = 'flex';
    } else tipsEl.style.display = 'none';
  }

  // Min/Max Temp
  var allTemps = ((rhr.temperature || {}).data || []).map(d => d.value).filter(v => typeof v === 'number');
  var todayMax = allTemps.length ? Math.max(...allTemps) : null; var todayMin = allTemps.length ? Math.min(...allTemps) : null;
  var d=new Date(); var todayStr = d.getFullYear().toString() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
  var todayFnd = ((fnd && fnd.weatherForecast) ? fnd.weatherForecast : []).find(w => w.forecastDate === todayStr);
  if (todayFnd) { todayMax = todayFnd.forecastMaxtemp?.value || todayMax; todayMin = todayFnd.forecastMintemp?.value || todayMin; }
  if (todayMax !== null) { document.getElementById('temp-max').textContent = Math.round(todayMax) + '°C'; document.getElementById('temp-min').textContent = (todayMin !== null ? Math.round(todayMin) : '--') + '°C'; }

  // Sun
  var sun = getSunTimes();
  if (sun) { document.getElementById('sunrise-time').textContent = fmtMinutes(sun.rise); document.getElementById('sunset-time').textContent = fmtMinutes(sun.set); }

  // Show combined bottom row
  var bottomRow = document.getElementById('weather-bottom-row');
  if (bottomRow && (todayMax !== null || sun)) bottomRow.style.display = 'flex';

  renderForecast(flw); updateLastUpdated();
}

function renderForecast(flw) {
  if (!flw) return;
  // 🔥 FIX 2: Forecast Period removed to clean the title
  
  // 🔥 FIX 3: Fixed the overlapping outlook display
  const descEl = document.getElementById('forecast-desc');
  if (descEl) { 
      descEl.textContent = flw.forecastDesc || ''; 
      descEl.className = ''; 
      descEl.style.cssText = ''; 
  }
  
  const outlookWrap = document.getElementById('forecast-outlook-wrap');
  const outlookEl = document.getElementById('forecast-outlook');

      outlookEl.textContent = flw.outlook;

const WARN_GIF = { WTCSGNL: c => ({TC1:'tc1', TC3:'tc3', TC8NE:'tc8ne', TC8NW:'tc8nw', TC8SE:'tc8se', TC8SW:'tc8sw', TC9:'tc9', TC10:'tc10'})[c] || 'tc1', WRAIN: c => ({WRAINA:'raina', WRAINR:'rainr', WRAINB:'rainb'})[c] || 'raina', WTS: () => 'ts', WHOT: () => 'vhot', WCOLD: () => 'cold', WFIRE: c => c === 'WFIRER' ? 'firer' : 'firey', WL: () => 'landslip', WMSGNL: () => 'sms', WFNTSA: () => 'ntfl', WFROST: () => 'frost', WTMW: () => 'tsunami-warn' };
function renderWarnings(warn) {
  var listEl = document.getElementById('warnings-list'); var icons = [];
  for (var key in warn) {
    if (!warn[key] || typeof warn[key] !== 'object' || warn[key].actionCode === 'CANCEL') continue;
    if (!WARN_GIF[key]) continue;
    var gifName = WARN_GIF[key](warn[key].code || '');
    icons.push(`<div class="warn-icon-wrap" title="${warn[key].name || key}"><img src="https://www.weather.gov.hk/textonly/img/warn/${gifName}.gif" alt="${warn[key].name || key}" class="warn-icon-img" onerror="this.style.display='none'"></div>`);
  }
  listEl.innerHTML = icons.length === 0 ? '<span class="warn-none">✓ 目前沒有生效警告</span>' : icons.join('');
}

function showWeatherError(msg) {
  if (document.getElementById('weather-temp-num')) { document.getElementById('weather-temp-num').textContent = '--'; document.getElementById('weather-temp-num').style.color = 'var(--accent-red)'; }
  document.getElementById('warnings-list').innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem">—</span>';
  if (document.getElementById('forecast-desc')) { document.getElementById('forecast-desc').textContent = '天氣預報讀取失敗'; document.getElementById('forecast-desc').className = ''; }
}

// ===== Transport Core Logic =====
const stopCache = {};
async function fetchKMBStops(route, serviceType, direction) { const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${direction}/${serviceType}`); const json = await res.json(); return json.data || []; }
async function fetchCTBStops(route, direction) { const res = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${route}/${direction}`); const json = await res.json(); return json.data || []; }
async function fetchKMBETA(stopId, route, serviceType) { const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${stopId}/${route}/${serviceType}`); const json = await res.json(); return json.data || []; }
async function fetchKMBStopInfo(stopId) { if (stopCache[`kmbstop_${stopId}`]) return stopCache[`kmbstop_${stopId}`]; const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${stopId}`); const json = await res.json(); stopCache[`kmbstop_${stopId}`] = json.data; return json.data; }
async function fetchCTBETA(stopId, route) { const res = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${stopId}/${route}`); const json = await res.json(); return json.data || []; }
async function fetchCTBStopInfo(stopId) { if (stopCache[`ctbstop_${stopId}`]) return stopCache[`ctbstop_${stopId}`]; const res = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/stop/${stopId}`); const json = await res.json(); stopCache[`ctbstop_${stopId}`] = json.data; return json.data; }

function etaMinutes(etaStr) { if (!etaStr) return null; return Math.round((new Date(etaStr) - new Date()) / 1000 / 60); }
function etaDisplay(mins) {
  if (mins === null) return { text: '—', cls: '' };
  if (mins <= 1) return { text: '即將', cls: 'eta-arriving' };
  return { text: `${mins}`, cls: mins <= 5 ? 'eta-soon' : 'eta-normal' };
}

// ===== Bus Output Generator (Dense Layout) =====
async function fetchBuses() {
  const container = document.getElementById('bus-routes-container');
  const routes = config.busRoutes || [];
  if (!routes.length || !routes.some(r => r.stopId)) {
    container.innerHTML = `<div class="eta-empty" style="padding:20px;text-align:center;">尚未設定巴士路線<br><span style="font-size:0.75rem;">請點擊右上角設定</span></div>`;
    return;
  }

  // Skeleton Loader for Dense Layout
  container.innerHTML = routes.filter(r => r.stopId).map(() => `
    <div class="t-row"><div class="t-left"><div class="skeleton" style="width:48px;height:34px;border-radius:6px;"></div><div class="t-info"><div class="skeleton" style="width:100px;height:14px;border-radius:4px;margin-bottom:4px;"></div><div class="skeleton" style="width:60px;height:10px;border-radius:4px;"></div></div></div><div class="t-right"><div class="skeleton" style="width:40px;height:24px;border-radius:4px;"></div></div></div>
  `).join('');

  const activeRoutes = routes.filter(r => r.stopId && r.route && r.company);
  const results = await Promise.allSettled(activeRoutes.map(r => fetchSingleBusRoute(r)));
  
  let html = '';
  results.forEach((res, i) => {
    if (res.status === 'fulfilled') html += res.value;
    else html += `<div class="t-row"><div class="t-left"><span class="route-badge bus-${activeRoutes[i].company.toLowerCase()}">${activeRoutes[i].route}</span><div class="t-info"><span class="t-name">${activeRoutes[i].stopName || activeRoutes[i].stopId}</span></div></div><div class="t-right"><span class="eta-empty">⚠ 錯誤</span></div></div>`;
  });
  container.innerHTML = html || `<div class="eta-empty" style="padding:20px;text-align:center;">設定無效</div>`;
  if (document.getElementById('bus-count-label')) document.getElementById('bus-count-label').textContent = `${activeRoutes.length} 條路線`;
}

async function fetchSingleBusRoute(r) {
  let etas = []; let stopName = r.stopName || r.stopId; let dest = '';
  try {
    if (r.company === 'KMB') {
      etas = await fetchKMBETA(r.stopId, r.route, r.serviceType || '1');
      if (!r.stopName) { try { const info = await fetchKMBStopInfo(r.stopId); stopName = info?.name_tc || r.stopId; } catch(e){} }
    } else if (r.company === 'CTB') {
      etas = await fetchCTBETA(r.stopId, r.route);
      if (!r.stopName) { try { const info = await fetchCTBStopInfo(r.stopId); stopName = info?.name_tc || r.stopId; } catch(e){} }
    }
  } catch(e) { throw e; }

  const etaRows = (etas || []).filter(e => e.eta).slice(0, 3).map((e, i) => {
    const mins = etaMinutes(e.eta); const dsp = etaDisplay(mins);
    return { mins, dsp };
  });

  if (etas.length > 0) dest = etas[0]?.dest_tc || '';

  const pillsHTML = etaRows.length > 0 ? etaRows.map(row => {
    const minsLabel = row.dsp.text === '即將' ? row.dsp.text : `${row.dsp.text}<span class="eta-pill-mins">分</span>`;
    return `<span class="eta-pill ${row.dsp.cls}">${minsLabel}</span>`;
  }).join('') : `<span class="eta-empty">沒有班次資料</span>`;

  return `
    <div class="t-row">
      <div class="t-left">
        <span class="route-badge bus-${r.company.toLowerCase()}">${r.route}</span>
        <div class="t-info">
          <span class="t-name">${stopName}</span>
          ${dest ? `<span class="t-dest">往 ${dest}</span>` : ''}
        </div>
      </div>
      <div class="t-right">${pillsHTML}</div>
    </div>`;
}

async function fetchMTR() {

  if (!routes.length) { container.innerHTML = '<div class="eta-empty" style="padding:20px;text-align:center;">尚未設定港鐵車站<br><span style="font-size:0.75rem;">請點擊右上角設定</span></div>'; if(document.getElementById('mtr-count-label')) document.getElementById('mtr-count-label').textContent = ''; return; }

    <div class="t-row"><div class="t-left"><div class="skeleton" style="width:48px;height:34px;border-radius:6px;"></div><div class="t-info"><div class="skeleton" style="width:80px;height:14px;border-radius:4px;margin-bottom:4px;"></div><div class="skeleton" style="width:50px;height:10px;border-radius:4px;"></div></div></div><div class="t-right-mtr"><div class="skeleton" style="width:90px;height:16px;border-radius:4px;"></div><div class="skeleton" style="width:90px;height:16px;border-radius:4px;"></div></div></div>
  `).join('');

  const results = await Promise.allSettled(routes.map(r => fetchSingleMTRRoute(r)));
  let html = '';
  results.forEach((res, i) => {
    if (res.status === 'fulfilled') html += res.value;
    else html += `<div class="mtr-row"><div class="mtr-col1"><span class="mtr-line-name mtr-text-${routes[i].line}">${MTR_LINES[routes[i].line]?.tc||routes[i].line}</span><span class="mtr-sta-name">${MTR_STATIONS[routes[i].station]||routes[i].station}</span></div><div class="mtr-col-dir"><span class="eta-empty">⚠ 錯誤</span></div><div class="mtr-col-dir"></div></div>`;
  });
  container.innerHTML = html || '<div class="eta-empty">沒有班次資料</div>';
  if(document.getElementById('mtr-count-label')) document.getElementById('mtr-count-label').textContent = routes.length + ' 個車站';
}

async function fetchSingleMTRRoute(r) {
  const url = 'https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=' + r.line + '&sta=' + r.station + '&lang=TC';
  const timeout = ms => new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout')), ms));
  const res = await Promise.race([fetch(url), timeout(10000)]);
  const json = await res.json();
  if (!json || json.status !== 1) throw new Error('API error');

  const stationData = (json.data || {})[r.line + '-' + r.station] || {};
  const lineName = MTR_LINES[r.line]?.tc || r.line;
  const staName = MTR_STATIONS[r.station] || r.station;

  function buildPills(trains) {
    let valid = trains ? trains.filter(t => t.valid === 'Y').slice(0,3) : [];
    if (!valid.length) return '<span class="eta-empty" style="font-size:0.82rem;padding:0;">暫時沒有班次</span>';
    return valid.map(t => {
      let mins = parseInt(t.ttnt, 10);
      let cls = mins <= 1 ? 'eta-arriving' : mins <= 4 ? 'eta-soon' : 'eta-normal';
      let timeStr = mins <= 1 ? '即將' : mins + '<span class="eta-pill-mins">分</span>';
      return `<span class="eta-pill ${cls}" style="padding:3px 7px;font-size:1.05rem;min-width:30px;">${timeStr}</span>`;
    }).join('');
  }

  const dirNames = { TWL:['中環','荃灣'], ISL:['柴灣','堅尼地城'], KTL:['觀塘','調景岺'], EAL:['紅磡','羅湖/落馬洲'], TML:['屯門','烏溪沙'], TKL:['康城','寶琳'], TCL:['東涌','香港'], AEL:['機場','香港'], SIL:['海怡半島','金鐘'], DRL:['迪士尼','欣澳'] };
  const [downDest, upDest] = dirNames[r.line] || ['市區','外線'];

  return `
    <div class="mtr-row">
      <div class="mtr-col1">
        <span class="mtr-line-name mtr-text-${r.line}">${lineName}</span>
        <span class="mtr-sta-name">${staName}</span>
      </div>
      <div class="mtr-col-dir">
        <span class="mtr-dir-label">↓ 往${downDest}</span>
        <div class="mtr-pills">${buildPills(stationData.DOWN)}</div>
      </div>
      <div class="mtr-col-dir">
        <span class="mtr-dir-label">↑ 往${upDest}</span>
        <div class="mtr-pills">${buildPills(stationData.UP)}</div>
      </div>
    </div>`;
}

const NEWS_PROXY = 'https://proxy.cors.sh/';
function parseRSS(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  return Array.from(doc.querySelectorAll('item')).map(item => ({
    title: item.querySelector('title')?.textContent || '',
    pubDate: item.querySelector('pubDate')?.textContent || ''
  }));
}
function fmtNewsTime(pubDate) {
  try { return new Date(pubDate).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Hong_Kong'}); }
  catch(e) { return ''; }
}
// ===== News Card State =====
let _newsCardData = {}; // { label: [{title,pubDate},...] }
let _newsCardTab = 0;
let _newsTabTimer = null;

function renderNewsCard() {
  const feeds = config.newsFeeds && config.newsFeeds.length ? config.newsFeeds : DEFAULT_CONFIG.newsFeeds;
  const activeFeedLabels = ALL_NEWS_FEEDS.filter(f => feeds.includes(f.url)).map(f => f.label);

  tabsEl.innerHTML = activeFeedLabels.map((label, i) =>
    `<button class="news-tab-btn${i===_newsCardTab?' active':''}" onclick="switchNewsTab(${i})">${label}</button>`
  ).join('');
  // Body
  const label = activeFeedLabels[_newsCardTab];
  const items = _newsCardData[label] || [];

function switchNewsTab(i) {
  _newsCardTab = i;
  clearInterval(_newsTabTimer);
  renderNewsCard();
  startNewsTabTimer();

function startNewsTabTimer() {
  clearInterval(_newsTabTimer);
  const feeds = config.newsFeeds && config.newsFeeds.length ? config.newsFeeds : DEFAULT_CONFIG.newsFeeds;
  const total = ALL_NEWS_FEEDS.filter(f => feeds.includes(f.url)).length;
  if (total <= 1) return;
  _newsTabTimer = setInterval(() => {
    _newsCardTab = (_newsCardTab + 1) % total;
    renderNewsCard();
  }, 15000);

async function fetchNews() {
  try {
    // Ticker: always local news, 3 items
    const localUrl = 'https://rthk9.rthk.hk/rthk/news/rss/c_expressnews_clocal.xml';
    const localItems = await fetch(NEWS_PROXY+localUrl,{cache:'no-store'}).then(r=>r.text()).then(parseRSS);
    const tickerItems = localItems.slice(0,3);
    const t = document.getElementById('news-ticker-track');
    if (t && tickerItems.length) {
      t.innerHTML = [...tickerItems,...tickerItems].map(item =>
        `<span class="ticker-item">${item.title}<span class="ticker-time">${fmtNewsTime(item.pubDate)}</span></span>`
      ).join('');
    }
    // News Card: fetch all selected feeds
    const feeds = config.newsFeeds && config.newsFeeds.length ? config.newsFeeds : DEFAULT_CONFIG.newsFeeds;
    const feedResults = await Promise.allSettled(feeds.map(url => fetch(NEWS_PROXY+url,{cache:'no-store'}).then(r=>r.text()).then(parseRSS).then(items => ({ url, items }))));
    _newsCardData = {};
    feedResults.forEach(r => {
      if (r.status === 'fulfilled') {
        const feed = ALL_NEWS_FEEDS.find(f => f.url === r.value.url);
        if (feed) _newsCardData[feed.label] = r.value.items;
      }
    });
    renderNewsCard();
    startNewsTabTimer();
  } catch(e) {
    const t = document.getElementById('news-ticker-track');
    if(t) t.innerHTML = '<span class="ticker-item">無法載入新聞</span>';
  }
}

function calcSunriseSunset(date) {
  var lat=22.3193, lon=114.1694, rad=Math.PI/180; var n=Math.floor((Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())-Date.UTC(2000,0,1,12))/86400000); var L=(280.46+0.9856474*n)%360; var g=(357.528+0.9856003*n)%360; var lam=L+1.915*Math.sin(g*rad)+0.02*Math.sin(2*g*rad); var sinDec=Math.sin(23.439*rad)*Math.sin(lam*rad); var cosDec=Math.cos(Math.asin(sinDec)); var cosH=(Math.cos(90.833*rad)-sinDec*Math.sin(lat*rad))/(cosDec*Math.cos(lat*rad)); if(cosH<-1||cosH>1)return null; var H=Math.acos(cosH)/rad; var eot=(L-lam)/15; var noon=12-lon/15-eot; var riseUTC=noon-H/15; var setUTC=noon+H/15; return { rise: Math.round((((riseUTC+8)%24+24)%24)*60), set: Math.round((((setUTC+8)%24+24)%24)*60) };
}
var _sunTimes = null; function getSunTimes() { if (!_sunTimes) _sunTimes = calcSunriseSunset(new Date()); return _sunTimes; }
function fmtMinutes(m) { return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }

function applyTheme(isLight) { document.body.classList.toggle('theme-light', isLight); if(document.getElementById('theme-icon-moon')) document.getElementById('theme-icon-moon').style.display = isLight?'none':'block'; if(document.getElementById('theme-icon-sun')) document.getElementById('theme-icon-sun').style.display=isLight?'block':'none'; }
function checkAutoTheme() { if (_manualTheme !== null) return; var now = new Date(); var nowMin = now.getHours() * 60 + now.getMinutes(); var sun = getSunTimes(); var isLight = sun ? (nowMin >= sun.rise && nowMin < sun.set) : (nowMin >= 7*60 && nowMin < 19*60); applyTheme(isLight); }
function manualToggleTheme() { var isLight = document.body.classList.contains('theme-light'); _manualTheme = isLight ? 'dark' : 'light'; applyTheme(!isLight); }
setInterval(function() { var now=new Date(); var h=now.getHours(),m=now.getMinutes(); if(h===0&&m===0) _sunTimes=null; var sun=getSunTimes(); if(sun){ var nowMin=h*60+m; if(nowMin===sun.rise||nowMin===sun.set)_manualTheme=null; } checkAutoTheme(); }, 60000);

function getLunarDate(date) {
  const lunarDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
  try { const fmt=new Intl.DateTimeFormat('zh-HK-u-ca-chinese',{month:'long',day:'numeric'}); const parts=fmt.formatToParts(date); let month='',day=''; for(const p of parts){ if(p.type==='month')month=p.value; if(p.type==='day')day=lunarDays[parseInt(p.value)-1]||p.value; } return '農曆'+month+day; } catch(e){return '';}
}
function updateHeaderDate() { const now = new Date(); const solar = now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日'; const lunar = getLunarDate(now); const el = document.getElementById('header-date'); if (el) el.textContent = solar + (lunar ? ' (' + lunar + ')' : ''); }

function init() { updateHeaderDate(); checkAutoTheme(); applyVisibility(); fetchAll(); scheduleAutoRefresh(); setOrientIcon(false); /* default: landscape/tablet */ }
init();
</script>
